services:
  - type: web
    name: copernicus-marine-visualiser
    env: python
    buildCommand: pip install -r requirements.txt
    # Single worker + 4 threads — prevents uploaded files being lost
    # when multiple workers each have their own /tmp directory.
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 4 --worker-class gthread
    plan: free
